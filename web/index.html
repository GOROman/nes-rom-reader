<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famicom ROM Dumper — Web UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  /* Famicom palette: cream (body top) x maroon (body bottom / controller) x gold (logo) */
  :root {
    --cream:#d7cdb0; --cream-lt:#e8e1cc; --panel:#efe9d6;
    --maroon:#9a201a; --maroon-dk:#6d1611; --gold:#c9a227;
    --ink:#2a1d14; --white:#f5efdf; --ok:#3c8f3c; --ng:#9a201a; --info:#1f5c8b;
  }
  * { box-sizing: border-box; }
  body {
    margin:0; background:var(--cream);
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,.025) 0 2px, transparent 2px 4px);
    color:var(--ink); line-height:1.7;
    font-family: 'DotGothic16', "Hiragino Sans", sans-serif;
  }
  header {
    background:var(--maroon); color:var(--white);
    padding:18px 24px; border-bottom:6px solid var(--gold);
    box-shadow: 0 4px 0 var(--maroon-dk); position:relative;
  }
  header h1 { margin:0; font-family:'Press Start 2P', 'DotGothic16', monospace;
              font-size:1.05rem; color:var(--gold); text-shadow:2px 2px 0 var(--maroon-dk); letter-spacing:1px; }
  header .sub { font-size:.85rem; opacity:.9; margin-top:8px; }
  #langToggle {
    position:absolute; top:16px; right:20px; background:var(--gold); color:var(--maroon);
    border:2px solid var(--maroon-dk); border-radius:2px; padding:6px 12px; cursor:pointer;
    font-family:'Press Start 2P',monospace; font-size:.6rem; box-shadow:2px 2px 0 var(--maroon-dk);
  }
  main { max-width:820px; margin:0 auto; padding:24px; }
  .card {
    background:var(--panel); border:4px solid var(--maroon);
    box-shadow: 6px 6px 0 var(--maroon-dk); border-radius:2px;
    padding:20px; margin-bottom:26px;
  }
  .card h2 {
    margin:0 0 14px; font-family:'Press Start 2P','DotGothic16',monospace; font-size:.8rem;
    color:var(--maroon); background:var(--gold); display:inline-block;
    padding:6px 12px; border-radius:2px; box-shadow:3px 3px 0 var(--maroon-dk);
  }
  button {
    background:var(--maroon); color:var(--white); border:3px solid var(--gold);
    border-radius:2px; padding:10px 18px; font-size:.95rem; cursor:pointer;
    margin:4px 6px 4px 0; font-family:'DotGothic16',sans-serif;
    box-shadow:3px 3px 0 var(--maroon-dk); transition:transform .05s, box-shadow .05s;
  }
  button:hover:not(:disabled) { transform:translate(1px,1px); box-shadow:2px 2px 0 var(--maroon-dk); }
  button:active:not(:disabled) { transform:translate(3px,3px); box-shadow:0 0 0 var(--maroon-dk); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  button.secondary { background:var(--ink); border-color:var(--gold); }
  button.active { background:var(--gold); color:var(--maroon); }
  label { display:inline-block; margin:4px 12px 4px 0; }
  input[type=number], input[type=text], select {
    background:var(--white); color:var(--ink); border:3px solid var(--maroon);
    border-radius:2px; padding:6px 8px; width:90px; font-family:'DotGothic16',monospace;
  }
  .row { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
  .status { font-family:'DotGothic16', ui-monospace, monospace; font-size:.9rem; }
  .badge {
    display:inline-block; padding:4px 12px; border-radius:2px; font-size:.85rem; font-weight:bold;
    border:2px solid var(--ink); color:var(--white);
  }
  .badge.on { background:var(--ok); } .badge.off { background:#8a7f63; }
  #log {
    background:var(--ink); border:3px solid var(--maroon-dk); border-radius:2px;
    padding:12px; height:240px; overflow-y:auto; color:#d8cfb4;
    font-family:'DotGothic16', ui-monospace, monospace; font-size:.85rem; white-space:pre-wrap;
  }
  .log-ok { color:#7ec87e; } .log-ng { color:#f08a80; } .log-info { color:#e8c964; }
  progress { width:100%; height:16px; accent-color:var(--maroon); border:2px solid var(--maroon); }
  .warn { background:#f0e0b0; border:3px solid var(--gold); border-left-width:8px;
          padding:10px 14px; border-radius:2px; font-size:.85rem; color:var(--ink); }
  .grid { display:grid; grid-template-columns:auto 1fr; gap:6px 14px; font-size:.95rem; }
  footer { text-align:center; opacity:.65; font-size:.75rem; padding:20px; }
  a { color:var(--maroon); font-weight:bold; }
  /* 右上HUD: 通信状況 + デバイス状態(通常フロー・折り返し安全) */
  #hud { display:flex; align-items:center; gap:8px 12px; flex-wrap:wrap;
         justify-content:flex-end; margin-bottom:12px; line-height:1.2; }
  #hudDot { width:18px; height:18px; border-radius:50%; background:#8a7f63;
            border:2px solid var(--ink); box-shadow:1px 1px 0 var(--maroon-dk);
            display:inline-block; flex:0 0 auto; }
  #hudText { font-size:.8rem; color:var(--white); font-family:'DotGothic16',monospace; white-space:nowrap; }
  #hud #langToggle { margin-left:6px; }
  /* Dump進捗ダイアログ */
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100;
           display:flex; align-items:center; justify-content:center; }
  .modal-box { background:var(--panel); border:5px solid var(--maroon);
               box-shadow:8px 8px 0 var(--maroon-dk); border-radius:3px;
               padding:26px 30px; min-width:340px; text-align:center; }
  .modal-box h3 { margin:0 0 16px; font-family:'Press Start 2P',monospace; font-size:.8rem; color:var(--maroon); }
  .modal-box progress { height:22px; }
  #dumpDlgPct { margin-top:12px; font-family:'DotGothic16',monospace; font-size:1.1rem; color:var(--ink); }
  /* Android / スマホ レスポンシブ (WebSerial は Android Chrome でも動作) */
  @media (max-width: 640px) {
    header { padding:14px 16px 12px; }
    header h1 { font-size:.72rem; line-height:1.5; }
    header .sub { font-size:.7rem; }
    #hud { position:static; margin:0 0 10px; max-width:100%; justify-content:flex-start; }
    main { padding:14px; }
    .card { padding:14px; box-shadow:4px 4px 0 var(--maroon-dk); margin-bottom:18px; }
    .card h2 { font-size:.65rem; }
    button { padding:12px 16px; font-size:1rem; width:100%; margin:4px 0; }  /* タップしやすく */
    button#langToggle, #hud button { width:auto; padding:8px 12px; }
    .row { gap:10px; }
    label { display:block; margin:6px 0; width:100%; }
    input[type=number], input[type=text] { width:100%; max-width:160px; }
    input[type=range] { width:100% !important; }
    #log { height:180px; font-size:.8rem; }
    .modal-box { min-width:auto; width:88vw; padding:20px; }
    #palSwatches span { width:32px !important; height:32px !important; }  /* 指で押しやすく */
    .grid { grid-template-columns:1fr; gap:2px 0; }
    .grid > div:nth-child(odd) { font-weight:bold; opacity:.7; margin-top:6px; }
  }
</style>
</head>
<body>
<header>
  <div id="hud">
    <span id="hudConn" class="badge off"></span>
    <span id="hudDot"></span>
    <span id="hudText"></span>
    <button id="langToggle">日本語</button>
  </div>
  <h1>▲ FAMICOM ROM DUMPER ▲</h1>
  <div class="sub" data-i18n="sub"></div>
</header>
<main>
  <div class="card">
    <h2 data-i18n="c1title"></h2>
    <div class="row">
      <button id="btnConnect" data-i18n="connect"></button>
      <button id="btnDisconnect" class="secondary" disabled data-i18n="disconnect"></button>
      <span><span data-i18n="statusLabel"></span> <span id="connBadge" class="badge off"></span></span>
    </div>
    <div id="devInfo" class="grid" style="margin-top:12px; display:none">
      <div data-i18n="fwLabel"></div><div id="fwVer" class="status">-</div>
      <div data-i18n="mirrorLabel"></div><div id="mirror" class="status">-</div>
    </div>
    <div class="warn" id="noSerialWarn" style="display:none; margin-top:12px" data-i18n="noSerial"></div>
    <div class="warn" id="androidHint" style="display:none; margin-top:12px" data-i18n="androidHint"></div>
  </div>

  <div class="card">
    <h2 data-i18n="cStatusTitle"></h2>
    <div class="row" style="align-items:center; gap:14px">
      <button id="btnStatus" class="secondary" disabled data-i18n="checkStatus"></button>
    </div>
    <div id="statusDetail" class="grid" style="margin-top:12px; display:none">
      <div data-i18n="pinsLabel"></div><div id="stPins" class="status">-</div>
      <div data-i18n="mdLabel"></div><div id="stMd" class="status">-</div>
    </div>
  </div>

  <div class="card">
    <h2 data-i18n="c2title"></h2>
    <div class="row">
      <label><span data-i18n="mapper"></span> <input type="number" id="mapper" value="0" min="0" max="255"></label>
      <label>PRG(KB) <input type="number" id="prg" value="32" min="0" step="16"></label>
      <label>CHR(KB) <input type="number" id="chr" value="8" min="0" step="8"></label>
      <label><input type="checkbox" id="bankSwitch" style="width:auto"> <span data-i18n="bankSwitchLabel"></span></label>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="btnDump" disabled data-i18n="dump"></button>
    </div>
    <div id="dumpResult" style="margin-top:12px; display:none">
      <div class="grid">
        <div>PRG-CRC:</div><div id="resPrgCrc" class="status" style="font-size:1.05rem">-</div>
        <div>CHR-CRC:</div><div id="resChrCrc" class="status" style="font-size:1.05rem">-</div>
      </div>
      <button id="btnUseCrc" class="secondary" style="margin-top:8px" data-i18n="useAsRef"></button>
    </div>
  </div>

  <div class="card">
    <h2 data-i18n="cViewerTitle"></h2>
    <div class="row">
      <label><span data-i18n="loadFileLabel"></span> <input type="file" id="chrFile" accept=".nes,.chr,.bin" style="width:auto"></label>
      <button id="btnViewDump" class="secondary" disabled data-i18n="viewDump"></button>
    </div>
    <div class="row" style="margin-top:8px">
      <label><span data-i18n="paletteLabel"></span> <select id="palPreset" style="width:auto"></select></label>
      <span id="palSwatches" style="display:inline-flex; gap:4px"></span>
      <button id="btnCyclePal" class="secondary" data-i18n="cyclePal"></button>
    </div>
    <div class="row" style="margin-top:8px">
      <label><span data-i18n="scaleLabel"></span> <input type="range" id="scale" min="1" max="6" value="3" style="width:120px"></label>
      <label><span data-i18n="tilesRowLabel"></span> <input type="number" id="tilesRow" value="16" min="8" max="32"></label>
      <span id="viewerInfo" class="status" style="opacity:.8"></span>
    </div>
    <div style="margin-top:12px; overflow:auto; max-height:540px; border:3px solid var(--maroon); background:#000">
      <canvas id="chrCanvas" style="image-rendering:pixelated; display:block"></canvas>
    </div>
    <p style="font-size:.75rem; opacity:.7; margin:.4em 0" data-i18n="viewerHint"></p>
    <p style="font-size:.8rem; margin:.2em 0; color:var(--maroon); font-weight:bold" data-i18n="dblHint"></p>
    <div class="row" style="margin-top:8px">
      <button id="btnEditMode" class="secondary" data-i18n="editMode"></button>
      <span id="selTile" class="status" style="opacity:.85"></span>
    </div>
    <div id="editTools" style="display:none; margin-top:8px">
      <div class="row">
        <button id="btnErase" class="secondary" data-i18n="erase"></button>
        <label><span data-i18n="copyFromLabel"></span> <input type="number" id="copySrc" min="0" value="0" style="width:80px"></label>
        <button id="btnPaste" class="secondary" data-i18n="pasteTile"></button>
        <button id="btnUndoEdit" class="secondary" data-i18n="undoEdit"></button>
      </div>
      <div class="row" style="margin-top:6px">
        <button id="btnDlChr" data-i18n="dlChr"></button>
        <button id="btnDlNes" data-i18n="dlNes"></button>
      </div>
      <p style="font-size:.75rem; opacity:.7; margin:.4em 0" data-i18n="editHint"></p>

      <hr style="border:none; border-top:3px solid var(--maroon); margin:14px 0">
      <h3 style="margin:0 0 8px; font-size:.9rem; color:var(--maroon)" data-i18n="textToolTitle"></h3>
      <p style="font-size:.75rem; opacity:.75; margin:.2em 0" data-i18n="textToolHint"></p>
      <div class="row" style="margin-top:6px">
        <label><span data-i18n="fontStartLabel"></span> <input type="number" id="fontStart" value="0" min="0" style="width:90px"></label>
        <label style="flex:1 1 260px"><span data-i18n="fontCharsLabel"></span>
          <input type="text" id="fontChars" placeholder="あいうえお… / 0123456789ABC…" style="width:100%; max-width:420px"></label>
      </div>
      <div class="row" style="margin-top:6px">
        <label><span data-i18n="destStartLabel"></span> <input type="number" id="destStart" value="0" min="0" style="width:90px"></label>
        <label><span data-i18n="wrapLabel"></span> <input type="number" id="destWrap" value="16" min="1" style="width:90px"></label>
        <label><input type="checkbox" id="blankUnknown" checked style="width:auto"> <span data-i18n="blankUnknownLabel"></span></label>
      </div>
      <div style="margin-top:6px">
        <textarea id="msgText" rows="3" placeholder="エンジニアこんどう よしひと。"
          style="width:100%; background:var(--white); color:var(--ink); border:3px solid var(--maroon);
                 border-radius:2px; padding:8px; font-family:'DotGothic16',monospace"></textarea>
      </div>
      <div class="row" style="margin-top:6px">
        <button id="btnStamp" data-i18n="stampBtn"></button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 data-i18n="c3title"></h2>
    <p style="font-size:.85rem; opacity:.85; margin:.2em 0" data-i18n="testDesc"></p>
    <div class="row">
      <label><span data-i18n="goldPrgLabel"></span> <input type="text" id="goldPrg" placeholder="8-hex" style="width:110px"></label>
      <label><span data-i18n="goldChrLabel"></span> <input type="text" id="goldChr" placeholder="8-hex" style="width:110px"></label>
    </div>
    <div class="row" style="margin-top:8px">
      <button id="btnSelfTest" class="secondary" disabled data-i18n="selftest"></button>
      <button id="btnFactory" disabled data-i18n="factory"></button>
      <span id="testResult" class="badge off" style="display:none"></span>
    </div>
  </div>

  <div class="card">
    <h2 data-i18n="logTitle"></h2>
    <div id="log"></div>
  </div>
</main>
<div id="fwDialog" class="modal" style="display:none">
  <div class="modal-box" style="max-width:520px">
    <h3 data-i18n="fwOldTitle"></h3>
    <p style="text-align:left; font-size:.9rem" data-i18n="fwOldBody"></p>
    <pre style="text-align:left; background:var(--ink); color:#d8cfb4; padding:10px;
                border-radius:2px; font-size:.8rem; overflow-x:auto">cd firmware
pio run -t upload</pre>
    <div id="fwVersions" class="status" style="font-size:.85rem; opacity:.85"></div>
    <div class="row" style="justify-content:center; margin-top:12px">
      <button id="fwDlgClose" data-i18n="fwOldClose"></button>
    </div>
  </div>
</div>

<div id="pixelDialog" class="modal" style="display:none">
  <div class="modal-box">
    <h3 id="pxTitle">TILE</h3>
    <canvas id="pxCanvas" width="288" height="288"
            style="image-rendering:pixelated; border:3px solid var(--maroon); background:#000;
                   cursor:crosshair; touch-action:none; max-width:80vw; max-height:60vh"></canvas>
    <div class="row" id="pxPal" style="justify-content:center; margin-top:12px; gap:8px"></div>
    <div class="row" style="justify-content:center; margin-top:12px">
      <button id="pxApply" data-i18n="pxApply"></button>
      <button id="pxClear" class="secondary" data-i18n="pxClear"></button>
      <button id="pxCancel" class="secondary" data-i18n="pxCancel"></button>
    </div>
  </div>
</div>

<div id="dumpDialog" class="modal" style="display:none">
  <div class="modal-box">
    <h3 id="dumpDlgTitle">DUMPING...</h3>
    <progress id="prog" value="0" max="100"></progress>
    <div id="dumpDlgPct">0%</div>
  </div>
</div>

<footer>
  nes-rom-reader — Powered by Claude Code (Fable 5)<br>
  <a href="https://github.com/GOROman/nes-rom-reader" target="_blank" rel="noopener">GitHub</a>
  ・
  <a href="https://x.com/GOROman" target="_blank" rel="noopener">X @GOROman</a>
</footer>

<script>
// ---- i18n ----
const STRINGS = {
  en: {
    sub: "Family Computer Cartridge Reader — WebSerial (Chrome / Edge) / M5Stamp S3・famidump v0.3",
    c1title: "1. Connect", connect: "🔌 Connect Device", disconnect: "Disconnect",
    statusLabel: "Status:", fwLabel: "Firmware:", mirrorLabel: "Mirroring:",
    connected: "Connected", disconnected: "Disconnected",
    noSerial: "This browser does not support WebSerial. Please use desktop Chrome or Edge.",
    androidHint: "Android: connect the M5Stamp S3 via a USB-OTG adapter, then tap Connect and allow the USB/serial permission in the popup. If no port appears: (1) use an OTG adapter + data-capable cable, (2) unlock the phone and reconnect, (3) enable chrome://flags/#enable-experimental-web-platform-features. USB hubs and charge-only cables will not work.",
    useAsRef: "→ Use these CRCs as factory-test reference",
    cStatusTitle: "Device Status", checkStatus: "🔄 Check Status",
    pinsLabel: "Control pins:", mdLabel: "Data bus (float):",
    stReady: "READY (green)", stBusy: "BUSY (blue)", stError: "ERROR (red)", stOffline: "OFFLINE",
    stChecking: "Checking...", stPinsNg: "⚠ Control pins FAIL — check ESP32 GPIO wiring",
    statusLine: (m, p) => "READY / mirror " + m + " / pins " + p,
    c2title: "2. Dump", mapper: "Mapper", dump: "⬇️ Dump & Save .nes",
    bankSwitchLabel: "CHR bank switching (CNROM / mapper 3)",
    bankSel: (b, a) => "  bank " + b + " selected (via PRG $" + a + ")",
    bankNotFound: b => "Bank " + b + ": no matching byte in PRG — cannot select this bank",

    bankNeedFw: "Firmware does not support the B command. Please flash the latest firmware (cd firmware && pio run -t upload)",
    prgDead: "PRG read failed (all bytes identical). Reseat the cartridge and clean its contacts, then check /ROMSEL (slot pin 44), the CPU data lines (slot pins 36-43) and U6.",

    bankBadResp: r => "Unexpected response to bank select: " + r,

    tilesInfo: (n, kb) => n + " tiles (" + kb + " KB)",

    editHint: "Click a tile to select it, then Erase or paste another tile over it to censor a glyph/logo. CHR is pixel graphics (not text), so words cannot be auto-detected — edit the tiles you spot, then download.",
    selInfo: n => "Selected tile: #" + n,
    noNes: "No .nes source (this data was a raw .chr). Use Download .chr.",
    pxApply: "✔ Apply", pxClear: "Clear", pxCancel: "Cancel",
    pxTitle: n => "PIXEL EDITOR — TILE #" + n,
    pxDone: n => "Tile #" + n + " updated in the pixel editor",
    dblHint: "💡 Double-click a tile to open the 8×8 pixel editor.",
    textToolTitle: "✍ Write text with the cartridge font",
    textToolHint: "The message tiles in CHR are just font glyphs placed in order. Tell the tool where the font starts and the character order of the glyphs, then type your text — it copies the matching glyph tiles into the destination. Hover a tile to see its number.",
    fontStartLabel: "Font start tile #", fontCharsLabel: "Glyph order (characters in tile order):",
    destStartLabel: "Write to tile #", wrapLabel: "Tiles per line",
    blankUnknownLabel: "Blank unknown chars",
    stampBtn: "✍ Write text into CHR",
    stampDone: (n, s) => "Wrote " + n + " tiles from #" + s,
    stampNeedFont: "Enter the glyph order (font character list) first",
    hoverTile: n => "Tile #" + n,
    c3title: "3. Factory Test",
    testDesc: "Insert a reference cartridge (known CRC) and run. If the dumped CRC matches, result is PASS. For post-assembly 100% inspection.",
    goldPrgLabel: "Ref PRG-CRC", goldChrLabel: "Ref CHR-CRC (opt)",
    selftest: "⚙️ Self-Test (T)", factory: "✅ Run Factory Test", logTitle: "Log",
    mirrorH: " (horizontal)", mirrorV: " (vertical)", mirrorQ: " (unknown / no cartridge)",
    badResp: v => "Invalid device response: " + JSON.stringify(v),
    connErr: e => "Connection failed: " + e,
    connMsg: (v, m) => "Connected: " + v + " / mirroring " + m,
    disconnected2: "Disconnected",
    devErr: s => "Device error response: " + s,
    crcMismatch: (d, h) => "CRC mismatch (device=" + d + " host=" + h + ")",

// ---- CRC32 (IEEE 802.3 / zlib compatible) ----
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
const hex8 = n => (n >>> 0).toString(16).toUpperCase().padStart(8, '0');

// ---- log ----
const logEl = document.getElementById('log');
function log(msg, cls) {
  const span = document.createElement('span');
  if (cls) span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

// ---- serial ----
let port = null, reader = null, writer = null;
let rxBuf = new Uint8Array(0);

function appendRx(chunk) {
  const n = new Uint8Array(rxBuf.length + chunk.length);
  n.set(rxBuf); n.set(chunk, rxBuf.length); rxBuf = n;
}
async function readLoop() {
  try {
    while (port && port.readable) {
      const { value, done } = await reader.read();
      if (done) break;
      if (value) appendRx(value);
    }
  } catch (e) { /* on disconnect */ }
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function readLine(timeoutMs = 5000) {
  const t0 = performance.now();
  while (performance.now() - t0 < timeoutMs) {
    const nl = rxBuf.indexOf(0x0A);
    if (nl >= 0) {
      const line = new TextDecoder().decode(rxBuf.slice(0, nl)).replace(/\r$/, '');
      rxBuf = rxBuf.slice(nl + 1);
      return line;
    }
    await wait(5);
  }
  throw new Error(t('timeoutLine'));
}
async function readExact(n, timeoutMs = 20000) {
  const t0 = performance.now();
  while (rxBuf.length < n) {
    if (performance.now() - t0 > timeoutMs) throw new Error(t('timeoutByte', rxBuf.length, n));
    await wait(3);
  }
  const out = rxBuf.slice(0, n);
  rxBuf = rxBuf.slice(n);
  return out;
}
async function send(str) { await writer.write(new TextEncoder().encode(str)); }

// このWeb UIが必要とするファームウェアの最低バージョン。
// 新しいコマンド(B: バンク切替 など)を追加したら上げること。
const REQUIRED_FW = '0.3';

// "famidump v0.2" / "STATUS famidump-v0.3 ..." からバージョン部分を取り出す
function parseFwVersion(s) {
  const m = /famidump[ -]v?([0-9]+(?:\.[0-9]+)*)/i.exec(s || '');
  return m ? m[1] : null;
}
// a < b なら -1、等しければ 0、a > b なら 1
function cmpVersion(a, b) {
  const pa = a.split('.').map(Number), pb = b.split('.').map(Number);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const x = pa[i] || 0, y = pb[i] || 0;
    if (x !== y) return x < y ? -1 : 1;
  }
  return 0;
}
function checkFirmwareVersion(verLine) {
  const v = parseFwVersion(verLine);
  if (!v || cmpVersion(v, REQUIRED_FW) >= 0) return;
  log(t('fwOldLog', 'v' + v, REQUIRED_FW), 'log-ng');
  document.getElementById('fwVersions').textContent = t('fwVersions', 'v' + v, REQUIRED_FW);
  document.getElementById('fwDialog').style.display = 'flex';
}

async function connect() {
  if (!('serial' in navigator)) { document.getElementById('noSerialWarn').style.display = 'block'; return; }
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    reader = port.readable.getReader();
    writer = port.writable.getWriter();
    rxBuf = new Uint8Array(0);
    readLoop();
    await wait(1500);
    rxBuf = new Uint8Array(0);
    await send('V\n');
    const ver = await readLine(3000);
    if (!ver.includes('famidump')) { log(t('badResp', ver), 'log-ng'); await disconnect(); return; }
    await send('M\n');
    const m = await readLine(3000);
    const mtxt = m === 'H' ? t('mirrorH') : m === 'V' ? t('mirrorV') : t('mirrorQ');
    document.getElementById('fwVer').textContent = ver;
    document.getElementById('mirror').textContent = m + mtxt;
    document.getElementById('devInfo').style.display = 'grid';
    document.getElementById('connBadge').textContent = t('connected');
    document.getElementById('connBadge').className = 'badge on';
    setConn(true);
    for (const id of ['btnDump', 'btnFactory', 'btnSelfTest', 'btnStatus']) document.getElementById(id).disabled = false;
    document.getElementById('btnConnect').disabled = true;
    document.getElementById('btnDisconnect').disabled = false;
    log(t('connMsg', ver, m), 'log-ok');
    checkFirmwareVersion(ver);  // 古ければダイアログで警告
    await checkStatus();  // 接続直後に状態取得
  } catch (e) { log(t('connErr', e.message), 'log-ng'); setStatus('error'); }
}

// S コマンドで機械可読ステータスを取得しUIに反映
async function checkStatus() {
  if (!port) return;
  setStatus('checking');
  document.getElementById('btnStatus').disabled = true;
  try {
    rxBuf = new Uint8Array(0);
    await send('S\n');
    let line = '';
    const t0 = performance.now();
    while (performance.now() - t0 < 3000) {
      line = await readLine(3000);
      if (line.startsWith('STATUS')) break;
    }
    // 例: "STATUS famidump-v0.2 mirror=? pins=PASS md=0x20"
    const mMirror = line.match(/mirror=(\S+)/);
    const mPins = line.match(/pins=(\S+)/);
    const mMd = line.match(/md=(\S+)/);
    const mirror = mMirror ? mMirror[1] : '?';
    const pins = mPins ? mPins[1] : '?';
    const md = mMd ? mMd[1] : '?';
    document.getElementById('statusDetail').style.display = 'grid';
    document.getElementById('stPins').textContent = pins;
    document.getElementById('stMd').textContent = md;
    document.getElementById('mirror').textContent = mirror +
      (mirror === 'H' ? t('mirrorH') : mirror === 'V' ? t('mirrorV') : t('mirrorQ'));
    if (pins === 'PASS') {
      setStatus('ready', t('statusLine', mirror, pins));
      log('STATUS: ' + line.replace('STATUS ', ''), 'log-ok');
    } else {
      setStatus('error', t('stPinsNg'));
      log(t('stPinsNg'), 'log-ng');
    }
  } catch (e) { log('状態取得失敗 / status failed: ' + e.message, 'log-ng'); setStatus('error'); }
  finally { if (port) document.getElementById('btnStatus').disabled = false; }
}
async function disconnect() {
  try { if (reader) { await reader.cancel().catch(()=>{}); reader.releaseLock(); } } catch(e){}
  try { if (writer) writer.releaseLock(); } catch(e){}
  try { if (port) await port.close(); } catch(e){}
  port = reader = writer = null;
  document.getElementById('connBadge').textContent = t('disconnected');
  document.getElementById('connBadge').className = 'badge off';
  setConn(false);
  document.getElementById('devInfo').style.display = 'none';
  document.getElementById('statusDetail').style.display = 'none';
  setStatus('offline');
  for (const id of ['btnDump', 'btnFactory', 'btnSelfTest', 'btnStatus']) document.getElementById(id).disabled = true;
  document.getElementById('btnConnect').disabled = false;
  document.getElementById('btnDisconnect').disabled = true;
  log(t('disconnected2'), 'log-info');
}

async function dumpRegion(cmd, addr, length, onProgress) {
  await send(`${cmd} ${addr.toString(16).toUpperCase()} ${length.toString(16).toUpperCase()}\n`);
  const status = await readLine(5000);
  if (!status.startsWith('OK')) throw new Error(t('devErr', status));
  const data = new Uint8Array(length);
  let got = 0;
  while (got < length) {
    const need = Math.min(4096, length - got);
    const chunk = await readExact(need);
    data.set(chunk, got);
    got += need;
    if (onProgress) onProgress(got / length);
  }
  const crcLine = await readLine(5000);
  if (!crcLine.startsWith('CRC ')) throw new Error(t('noCrcLine', crcLine));
  const devCrc = parseInt(crcLine.split(' ')[1], 16) >>> 0;
  const hostCrc = crc32(data);
  if (devCrc !== hostCrc) throw new Error(t('crcMismatch', hex8(devCrc), hex8(hostCrc)));
  log(t('recv', cmd, length / 1024, hex8(hostCrc)), 'log-ok');
  return { data, crc: hostCrc };
}

// --- CNROM等のCHRバンク切替(バスコンフリクト方式) ---
// PRG内で「バンク番号と同じ値」を持つアドレスへダミーライトすると、
// ROM自身がその値をデータバスへ出し、カートリッジのラッチが取り込む。
function findBankAddr(prg, bank) {
  const i = prg.indexOf(bank);
  return i >= 0 ? 0x8000 + i : null;
}
async function selectBank(prg, bank) {
  const addr = findBankAddr(prg, bank);
  if (addr === null) throw new Error(t('bankNotFound', bank));
  await send(`B ${addr.toString(16).toUpperCase()}\n`);
  const resp = await readLine(3000);
  if (!resp.startsWith('BANK')) {
    // ERR = 古いファームで B コマンド未対応
    throw new Error(resp.trim() === 'ERR' ? t('bankNeedFw') : t('bankBadResp', resp));
  }
  log(t('bankSel', bank, addr.toString(16).toUpperCase()), 'log-info');
  return true;
}
async function dumpChrBanked(prg, chrKb, onProgress) {
  const banks = Math.floor(chrKb / 8);
  log(t('bankMode', banks), 'log-info');
  const out = new Uint8Array(chrKb * 1024);
  for (let b = 0; b < banks; b++) {
    await selectBank(prg, b);
    const part = await dumpRegion('C', 0x0000, 8 * 1024,
      p => onProgress && onProgress((b + p) / banks));
    out.set(part.data, b * 8 * 1024);
  }
  return { data: out, crc: crc32(out) };
}

function inesHeader(prgKb, chrKb, mapper, vertical) {
  const h = new Uint8Array(16);
  h.set([0x4E, 0x45, 0x53, 0x1A]);
  h[4] = prgKb / 16; h[5] = chrKb / 8;
  h[6] = ((mapper & 0x0F) << 4) | (vertical ? 1 : 0);
  h[7] = mapper & 0xF0;
  return h;
}

async function doDump() {
  const prgKb = +document.getElementById('prg').value;
  const chrKb = +document.getElementById('chr').value;
  const mapper = +document.getElementById('mapper').value;
  const dlg = document.getElementById('dumpDialog');
  const prog = document.getElementById('prog');
  const setProg = (v, phase) => {
    prog.value = v; document.getElementById('dumpDlgPct').textContent = Math.round(v) + '%';
    if (phase) document.getElementById('dumpDlgTitle').textContent = phase;
  };
  dlg.style.display = 'flex'; setProg(0, 'PRG...');
  document.getElementById('btnDump').disabled = true;
  try {
    await send('M\n'); const mirror = await readLine(3000);
    log(t('dumpStart', prgKb, chrKb, mapper, mirror), 'log-info');
    setStatus('busy');
    const prg = await dumpRegion('R', 0x8000, prgKb * 1024, p => setProg(p * (chrKb ? 50 : 100), 'PRG...'));
    let chr = { data: new Uint8Array(0) };
    // PRGが全バイト同一 = 読めていない。バンク切替はPRGの中身に依存するので
    // ここで止めないと「バンクNが見つからない」という誤解を招くエラーになる。
    if (new Set(prg.data).size === 1) {
      log(t('allSame', prg.data[0].toString(16).padStart(2, '0').toUpperCase()), 'log-ng');
      throw new Error(t('prgDead'));
    }
    const useBanks = document.getElementById('bankSwitch').checked && chrKb > 8;
    if (chrKb) {
      chr = useBanks
        ? await dumpChrBanked(prg.data, chrKb, p => setProg(50 + p * 50, 'CHR (bank)...'))
        : await dumpRegion('C', 0x0000, chrKb * 1024, p => setProg(50 + p * 50, 'CHR...'));
    }
    setProg(100, 'DONE');
    const header = inesHeader(prgKb, chrKb, mapper, mirror === 'V');
    const out = new Uint8Array(header.length + prg.data.length + chr.data.length);
    out.set(header); out.set(prg.data, header.length); out.set(chr.data, header.length + prg.data.length);
    const blob = new Blob([out], { type: 'application/octet-stream' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'dump.nes'; a.click();
    log(t('wrote', out.length), 'log-ok');
    // PRG-CRC / CHR-CRC を結果欄に表示(出荷テスト基準にも使える)
    window.lastPrgCrc = hex8(prg.crc);
    window.lastChrCrc = chrKb ? hex8(chr.crc) : '';
    document.getElementById('resPrgCrc').textContent = window.lastPrgCrc;
    document.getElementById('resChrCrc').textContent = window.lastChrCrc || '(none)';
    document.getElementById('dumpResult').style.display = 'block';
    log('PRG-CRC ' + window.lastPrgCrc + (chrKb ? ' / CHR-CRC ' + window.lastChrCrc : ''), 'log-ok');
    setStatus('ready');
    if (chrKb && chr.data.length) {
      window.lastChr = chr.data;
      window.viewerNesHead = new Uint8Array(header.length + prg.data.length);
      window.viewerNesHead.set(header); window.viewerNesHead.set(prg.data, header.length);  // 編集後.nes再生成用
      setChrData(chr.data);  // Super Monkey Viewer に反映
    }
  } catch (e) { log(t('dumpFail', e.message), 'log-ng'); setStatus('error'); }
  finally { document.getElementById('btnDump').disabled = false; setTimeout(() => dlg.style.display = 'none', 800); }
}

async function doSelfTest() {
  document.getElementById('btnSelfTest').disabled = true;
  try {
    log(t('stRun'), 'log-info');
    setStatus('busy');
    await send('T\n');
    const t0 = performance.now();
    while (performance.now() - t0 < 25000) {  // 1ステップ約1秒×十数手順に対応
      try { const line = await readLine(3000); log('  ' + line); if (line.startsWith('SELFTEST')) break; } catch (e) { break; }
    }
    setStatus('ready');
  } catch (e) { log(t('stFail', e.message), 'log-ng'); setStatus('error'); }
  finally { document.getElementById('btnSelfTest').disabled = false; }
}

async function doFactoryTest() {
  const goldPrg = document.getElementById('goldPrg').value.trim().toUpperCase();
  const goldChr = document.getElementById('goldChr').value.trim().toUpperCase();
  const prgKb = +document.getElementById('prg').value;
  const chrKb = +document.getElementById('chr').value;
  const badge = document.getElementById('testResult');
  badge.style.display = 'inline-block';
  document.getElementById('btnFactory').disabled = true;
  try {
    if (!goldPrg) { log(t('needRef'), 'log-ng'); badge.textContent = t('needRefBadge'); badge.className = 'badge off'; return; }
    log(t('ftStart'), 'log-info');
    setStatus('busy');
    let pass = true;
    // ① セルフテスト(ファーム側が1ステップ約1秒でLED点灯しながら進む)
    log(t('ftStep1'), 'log-info');
    await send('T\n');
    let stPass = true;
    const t0 = performance.now();
    while (performance.now() - t0 < 25000) {
      try { const line = await readLine(3000); log('  ' + line); if (line.startsWith('SELFTEST')) { stPass = line.endsWith('PASS'); break; } } catch (e) { break; }
    }
    if (!stPass) pass = false;
    await wait(1000);
    // ② PRG
    log(t('ftStep2'), 'log-info');
    const prg = await dumpRegion('R', 0x8000, prgKb * 1024);
    if (hex8(prg.crc) !== goldPrg) { log(t('prgNg', hex8(prg.crc), goldPrg), 'log-ng'); pass = false; }
    else log(t('prgOk', goldPrg), 'log-ok');
    await wait(1000);
    // ③ CHR
    if (chrKb && goldChr) {
      log(t('ftStep3'), 'log-info');
      const chr = await dumpRegion('C', 0x0000, chrKb * 1024);
      if (hex8(chr.crc) !== goldChr) { log(t('chrNg', hex8(chr.crc), goldChr), 'log-ng'); pass = false; }
      else log(t('chrOk', goldChr), 'log-ok');
      await wait(1000);
    }
    badge.textContent = pass ? 'PASS ✅' : 'FAIL ❌';
    badge.className = 'badge';
    badge.style.background = pass ? 'var(--ok)' : 'var(--ng)';
    setStatus(pass ? 'ready' : 'error');
    log(pass ? t('pass') : t('fail'), pass ? 'log-ok' : 'log-ng');
  } catch (e) { log(t('ftFail', e.message), 'log-ng'); badge.textContent = 'FAIL ❌'; badge.className = 'badge'; badge.style.background = 'var(--ng)'; }
  finally { document.getElementById('btnFactory').disabled = false; }
}

// ===== 🐵 Super Monkey Viewer (CHR-ROM タイルビューア) =====
// NES 2C02 マスターパレット(64色)
const NES_MASTER = [
  '#626262','#001FB2','#2404C8','#5200B2','#730076','#800024','#730B00','#522800',
  '#244400','#005700','#005C00','#005324','#003C76','#000000','#000000','#000000',
  '#ABABAB','#0D57FF','#4B30FF','#8A13FF','#BC08D6','#D21269','#C72E00','#9D5400',
  '#607B00','#209800','#00A300','#009942','#007DB4','#000000','#000000','#000000',
  '#FFFFFF','#53AEFF','#9085FF','#D365FF','#FF57FF','#FF5DCF','#FF7757','#FA9E00',
  '#BDC700','#7AE700','#43F611','#26EF7E','#2CD5F6','#4E4E4E','#000000','#000000',
  '#FFFFFF','#B6E1FF','#CED1FF','#E9C3FF','#FFBCFF','#FFBDF4','#FFC6C3','#FFD59A',
  '#E9E681','#CEF481','#B6FB9A','#A9FAC3','#A9F0F6','#B8B8B8','#000000','#000000'
];
// プリセット4色パレット(CSS色)
const PAL_PRESETS = [
  { name: 'Grayscale', colors: ['#000000', '#606060', '#B0B0B0', '#FFFFFF'] },
  { name: 'Game Boy', colors: ['#0f380f', '#306230', '#8bac0f', '#9bbc0f'] },
  { name: 'Mario', colors: ['#000000', '#B53120', '#FA9E00', '#FFFFFF'] },
  { name: 'Green', colors: ['#000000', '#005700', '#43F611', '#B6FB9A'] },
  { name: 'Blue', colors: ['#000000', '#001FB2', '#53AEFF', '#B6E1FF'] },
  { name: 'Amber', colors: ['#1a0d00', '#7a4300', '#FA9E00', '#FFD59A'] },
];
let chrData = null;            // 表示中のCHRバイト列(Uint8Array)
let curPal = PAL_PRESETS[0].colors.slice();
let palIdx = 0;

function hexToRgb(h) { const n = parseInt(h.slice(1), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }

let selectedTile = -1;   // 編集で選択中のタイル
let chrOrig = null;      // 編集前バックアップ(元に戻す用)

function renderChr() {
  const canvas = document.getElementById('chrCanvas');
  const ctx = canvas.getContext('2d');
  if (!chrData || chrData.length < 16) {
    canvas.width = 1; canvas.height = 1;
    document.getElementById('viewerInfo').textContent = t('noChr');
    return;
  }
  const scale = +document.getElementById('scale').value;
  const perRow = +document.getElementById('tilesRow').value;
  const nTiles = Math.floor(chrData.length / 16);
  const rows = Math.ceil(nTiles / perRow);
  const w = perRow * 8, h = rows * 8;
  // 1x のオフスクリーンに描いてから拡大
  const off = document.createElement('canvas'); off.width = w; off.height = h;
  const octx = off.getContext('2d');
  const img = octx.createImageData(w, h);
  const rgb = curPal.map(hexToRgb);
  for (let ti = 0; ti < nTiles; ti++) {
    const tx = (ti % perRow) * 8, ty = Math.floor(ti / perRow) * 8;
    const base = ti * 16;
    for (let y = 0; y < 8; y++) {
      const p0 = chrData[base + y], p1 = chrData[base + y + 8];
      for (let x = 0; x < 8; x++) {
        const bit = 7 - x;
        const c = ((p0 >> bit) & 1) | (((p1 >> bit) & 1) << 1);
        const [r, g, b] = rgb[c];
        const o = ((ty + y) * w + (tx + x)) * 4;
        img.data[o] = r; img.data[o + 1] = g; img.data[o + 2] = b; img.data[o + 3] = 255;
      }
    }
  }
  octx.putImageData(img, 0, 0);
  canvas.width = w * scale; canvas.height = h * scale;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, 0, 0, w * scale, h * scale);
  canvas._perRow = perRow; canvas._scale = scale; canvas._nTiles = nTiles;
  // 選択タイルの枠
  if (selectedTile >= 0 && selectedTile < nTiles) {
    const sx = (selectedTile % perRow) * 8 * scale, sy = Math.floor(selectedTile / perRow) * 8 * scale;
    ctx.strokeStyle = '#e94560'; ctx.lineWidth = Math.max(2, scale);
    ctx.strokeRect(sx + 0.5, sy + 0.5, 8 * scale - 1, 8 * scale - 1);
  }
  document.getElementById('viewerInfo').textContent = t('tilesInfo', nTiles, Math.round(chrData.length / 1024));
}

// クリック座標→タイル番号
function tileFromEvent(e) {
  const canvas = document.getElementById('chrCanvas');
  if (!chrData || !canvas._perRow) return -1;
  const r = canvas.getBoundingClientRect();
  const px = (e.clientX - r.left) * (canvas.width / r.width);
  const py = (e.clientY - r.top) * (canvas.height / r.height);
  const tsz = 8 * canvas._scale;
  const idx = Math.floor(py / tsz) * canvas._perRow + Math.floor(px / tsz);
  return (idx >= 0 && idx < canvas._nTiles) ? idx : -1;
}

// キャンバスクリック→タイル選択(編集モード時)
function onCanvasClick(e) {
  if (!document.getElementById('btnEditMode').classList.contains('active')) return;
  const idx = tileFromEvent(e);
  if (idx < 0) return;
  selectedTile = idx;
  document.getElementById('selTile').textContent = t('selInfo', idx);
  renderChr();
}

// ===== ドット絵エディタ(8×8ピクセル) =====
const PX_CELL = 36;           // 1ドットの表示サイズ
let pxTile = -1;              // 編集中タイル
let pxBuf = new Uint8Array(64); // 各ドットの色番号(0-3)
let pxColor = 3;              // 選択中の色番号
let pxDrawing = false;

function tileToPixels(idx) {
  const b = idx * 16, out = new Uint8Array(64);
  for (let y = 0; y < 8; y++) {
    const p0 = chrData[b + y], p1 = chrData[b + y + 8];
    for (let x = 0; x < 8; x++) {
      const bit = 7 - x;
      out[y * 8 + x] = ((p0 >> bit) & 1) | (((p1 >> bit) & 1) << 1);
    }
  }
  return out;
}
function pixelsToTile(idx, px) {
  const b = idx * 16;
  for (let y = 0; y < 8; y++) {
    let p0 = 0, p1 = 0;
    for (let x = 0; x < 8; x++) {
      const c = px[y * 8 + x] & 3, bit = 7 - x;
      if (c & 1) p0 |= 1 << bit;
      if (c & 2) p1 |= 1 << bit;
    }
    chrData[b + y] = p0; chrData[b + y + 8] = p1;
  }
}
function renderPx() {
  const cv = document.getElementById('pxCanvas');
  const ctx = cv.getContext('2d');
  cv.width = 8 * PX_CELL; cv.height = 8 * PX_CELL;
  for (let y = 0; y < 8; y++) for (let x = 0; x < 8; x++) {
    ctx.fillStyle = curPal[pxBuf[y * 8 + x]] || '#000';
    ctx.fillRect(x * PX_CELL, y * PX_CELL, PX_CELL, PX_CELL);
  }
  // グリッド線
  ctx.strokeStyle = 'rgba(154,32,26,.55)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 8; i++) {
    ctx.beginPath(); ctx.moveTo(i * PX_CELL + .5, 0); ctx.lineTo(i * PX_CELL + .5, 8 * PX_CELL); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * PX_CELL + .5); ctx.lineTo(8 * PX_CELL, i * PX_CELL + .5); ctx.stroke();
  }
}
function renderPxPalette() {
  const box = document.getElementById('pxPal');
  box.innerHTML = '';
  curPal.forEach((col, i) => {
    const sw = document.createElement('span');
    sw.style.cssText = `width:34px;height:34px;background:${col};display:inline-block;cursor:pointer;` +
      `border:3px solid ${i === pxColor ? 'var(--gold)' : 'var(--ink)'};box-shadow:2px 2px 0 var(--maroon-dk)`;
    sw.title = 'color ' + i;
    sw.onclick = () => { pxColor = i; renderPxPalette(); };
    box.appendChild(sw);
  });
}
function pxPaint(e) {
  const cv = document.getElementById('pxCanvas');
  const r = cv.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) * (cv.width / r.width) / PX_CELL);
  const y = Math.floor((e.clientY - r.top) * (cv.height / r.height) / PX_CELL);
  if (x < 0 || x > 7 || y < 0 || y > 7) return;
  pxBuf[y * 8 + x] = pxColor;
  renderPx();
}
// フォント字形タイルを並べてテキストをCHRへ書き込む
function stampText() {
  if (!chrData) { log(t('noChr'), 'log-ng'); return; }
  const fontStart = +document.getElementById('fontStart').value;
  const fontChars = document.getElementById('fontChars').value;
  const destStart = +document.getElementById('destStart').value;
  const wrap = Math.max(1, +document.getElementById('destWrap').value);
  const blankUnknown = document.getElementById('blankUnknown').checked;
  const msg = document.getElementById('msgText').value;
  if (!fontChars) { log(t('stampNeedFont'), 'log-ng'); return; }
  const nTiles = Math.floor(chrData.length / 16);
  let written = 0;
  const lines = msg.split('\n');
  for (let li = 0; li < lines.length; li++) {
    let dst = destStart + li * wrap;
    for (const ch of lines[li]) {
      if (dst < 0 || dst >= nTiles) break;
      const si = fontChars.indexOf(ch);
      const db = dst * 16;
      if (si >= 0) {
        const sb = (fontStart + si) * 16;
        if (sb + 16 <= chrData.length) { for (let i = 0; i < 16; i++) chrData[db + i] = chrData[sb + i]; written++; }
      } else if (blankUnknown) {
        for (let i = 0; i < 16; i++) chrData[db + i] = 0;  // 未知文字は空白タイル
        written++;
      }
      dst++;
    }
  }
  renderChr();
  log(t('stampDone', written, destStart), 'log-ok');
}

function openPixelEditor(idx) {
  if (!chrData || idx < 0) return;
  pxTile = idx;
  pxBuf = tileToPixels(idx);
  document.getElementById('pxTitle').textContent = t('pxTitle', idx);
  renderPxPalette(); renderPx();
  document.getElementById('pixelDialog').style.display = 'flex';
}
function closePixelEditor() { document.getElementById('pixelDialog').style.display = 'none'; pxTile = -1; }
function applyPixelEditor() {
  if (pxTile >= 0) {
    pixelsToTile(pxTile, pxBuf);
    log(t('pxDone', pxTile), 'log-ok');
    renderChr();
  }
  closePixelEditor();
}
function eraseTile() {
  if (selectedTile < 0 || !chrData) return;
  const b = selectedTile * 16;
  for (let i = 0; i < 16; i++) chrData[b + i] = 0;  // 全ピクセルを色0(通常は背景)に
  renderChr();
  log('タイル #' + selectedTile + ' を消去 / erased tile #' + selectedTile, 'log-info');
}
function pasteTile() {
  if (selectedTile < 0 || !chrData) return;
  const src = +document.getElementById('copySrc').value;
  if (src < 0 || src * 16 + 16 > chrData.length) return;
  const sb = src * 16, db = selectedTile * 16;
  for (let i = 0; i < 16; i++) chrData[db + i] = chrData[sb + i];
  renderChr();
  log('タイル #' + src + ' → #' + selectedTile + ' に貼付 / pasted', 'log-info');
}
function undoEdits() {
  if (!chrOrig) return;
  chrData = chrOrig.slice();
  window.lastChr = chrData;
  renderChr();
  log('編集を元に戻しました / edits reverted', 'log-info');
}
function download(bytes, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([bytes], { type: 'application/octet-stream' }));
  a.download = name; a.click();
}
function downloadChr() { if (chrData) download(chrData, 'edited.chr'); }
function downloadNes() {
  if (!chrData) return;
  if (!window.viewerNesHead) { log(t('noNes'), 'log-ng'); return; }
  const head = window.viewerNesHead;
  const out = new Uint8Array(head.length + chrData.length);
  out.set(head); out.set(chrData, head.length);
  download(out, 'edited.nes');
}

function renderSwatches() {
  const box = document.getElementById('palSwatches');
  box.innerHTML = '';
  curPal.forEach((col, i) => {
    const sw = document.createElement('span');
    sw.style.cssText = `width:22px;height:22px;background:${col};border:2px solid #2a1d14;cursor:pointer;display:inline-block;box-shadow:1px 1px 0 #6d1611`;
    sw.title = 'click: next color / 右クリック: prev';
    // クリックでマスターパレットの次色へ / 右クリックで前色へ
    const step = d => {
      let idx = NES_MASTER.findIndex(c => c.toUpperCase() === col.toUpperCase());
      if (idx < 0) idx = 0;
      idx = (idx + d + NES_MASTER.length) % NES_MASTER.length;
      curPal[i] = NES_MASTER[idx];
      renderSwatches(); renderChr();
    };
    sw.onclick = () => step(1);
    sw.oncontextmenu = e => { e.preventDefault(); step(-1); };
    box.appendChild(sw);
  });
}

function setPalette(colors) { curPal = colors.slice(); renderSwatches(); renderChr(); }

function setChrData(data) {
  chrData = data;
  chrOrig = data ? data.slice() : null;  // 編集前バックアップ
  selectedTile = -1;
  document.getElementById('selTile').textContent = '';
  document.getElementById('btnViewDump').disabled = !window.lastChr || window.lastChr.length === 0;
  renderChr();
}

// .nes / .chr / .bin を読み込んでCHRを表示
function loadChrFile(file) {
  const fr = new FileReader();
  fr.onload = () => {
    const buf = new Uint8Array(fr.result);
    let chr = buf;
    // iNES ヘッダなら CHR 部分を切り出す
    if (buf.length > 16 && buf[0] === 0x4E && buf[1] === 0x45 && buf[2] === 0x53 && buf[3] === 0x1A) {
      const prg = buf[4] * 16384, chrLen = buf[5] * 8192;
      if (chrLen === 0) { log('このROMはCHR-RAM (CHRデータ無し) / CHR-RAM ROM', 'log-ng'); return; }
      const chrStart = 16 + prg;
      chr = buf.slice(chrStart, chrStart + chrLen);
      window.viewerNesHead = buf.slice(0, chrStart);  // header + PRG(編集後.nes再生成用)
      log(`iNES読込: CHR ${chrLen / 1024}KB を抽出`, 'log-info');
    } else {
      window.viewerNesHead = null;  // 生CHRは.nes再生成不可
      log(`raw CHR読込: ${(buf.length / 1024).toFixed(1)}KB`, 'log-info');
    }
    setChrData(chr);
    document.getElementById('chrCanvas').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };
  fr.readAsArrayBuffer(file);
}

function initViewer() {
  const sel = document.getElementById('palPreset');
  PAL_PRESETS.forEach((p, i) => { const o = document.createElement('option'); o.value = i; o.textContent = p.name; sel.appendChild(o); });
  sel.onchange = () => { palIdx = +sel.value; setPalette(PAL_PRESETS[palIdx].colors); };
  document.getElementById('btnCyclePal').onclick = () => {
    palIdx = (palIdx + 1) % PAL_PRESETS.length; sel.value = palIdx; setPalette(PAL_PRESETS[palIdx].colors);
  };
  document.getElementById('scale').oninput = renderChr;
  document.getElementById('tilesRow').onchange = renderChr;
  document.getElementById('chrFile').onchange = e => { if (e.target.files[0]) loadChrFile(e.target.files[0]); };
  document.getElementById('btnViewDump').onclick = () => { if (window.lastChr) setChrData(window.lastChr); };
  // タイル編集(修正)
  const cv = document.getElementById('chrCanvas');
  cv.addEventListener('click', onCanvasClick);
  // ダブルクリックでドット絵エディタ起動(編集モード不要)
  cv.addEventListener('dblclick', e => { e.preventDefault(); const i = tileFromEvent(e); if (i >= 0) openPixelEditor(i); });
  // ホバーでタイル番号表示(フォント位置探し用)
  cv.addEventListener('mousemove', e => {
    const i = tileFromEvent(e);
    if (i >= 0) document.getElementById('viewerInfo').textContent = t('hoverTile', i);
  });
  cv.addEventListener('mouseleave', () => { if (chrData) renderChr(); });
  document.getElementById('btnStamp').onclick = stampText;
  // ドット絵エディタの操作
  const pxc = document.getElementById('pxCanvas');
  pxc.addEventListener('pointerdown', e => { pxDrawing = true; pxc.setPointerCapture(e.pointerId); pxPaint(e); });
  pxc.addEventListener('pointermove', e => { if (pxDrawing) pxPaint(e); });
  pxc.addEventListener('pointerup', () => { pxDrawing = false; });
  pxc.addEventListener('pointercancel', () => { pxDrawing = false; });
  document.getElementById('pxApply').onclick = applyPixelEditor;
  document.getElementById('pxCancel').onclick = closePixelEditor;
  document.getElementById('pxClear').onclick = () => { pxBuf.fill(0); renderPx(); };
  document.getElementById('btnEditMode').onclick = () => {
    const b = document.getElementById('btnEditMode');
    b.classList.toggle('active');
    const on = b.classList.contains('active');
    document.getElementById('editTools').style.display = on ? 'block' : 'none';
    document.getElementById('chrCanvas').style.cursor = on ? 'crosshair' : 'default';
    if (!on) { selectedTile = -1; document.getElementById('selTile').textContent = ''; renderChr(); }
  };
  document.getElementById('btnErase').onclick = eraseTile;
  document.getElementById('btnPaste').onclick = pasteTile;
  document.getElementById('btnUndoEdit').onclick = undoEdits;
  document.getElementById('btnDlChr').onclick = downloadChr;
  document.getElementById('btnDlNes').onclick = downloadNes;
  renderSwatches();
}

document.getElementById('fwDlgClose').onclick = () => { document.getElementById('fwDialog').style.display = 'none'; };
document.getElementById('btnConnect').onclick = connect;
document.getElementById('btnDisconnect').onclick = disconnect;
document.getElementById('btnDump').onclick = doDump;
document.getElementById('btnSelfTest').onclick = doSelfTest;
document.getElementById('btnFactory').onclick = doFactoryTest;
document.getElementById('btnStatus').onclick = checkStatus;
document.getElementById('langToggle').onclick = () => { lang = lang === 'ja' ? 'en' : 'ja'; applyLang(); if (!port) setStatus('offline'); };
// Dump結果のCRCを出荷テストの基準値にワンタップで設定
document.getElementById('btnUseCrc').onclick = () => {
  if (window.lastPrgCrc) document.getElementById('goldPrg').value = window.lastPrgCrc;
  if (window.lastChrCrc) document.getElementById('goldChr').value = window.lastChrCrc;
  log('出荷テスト基準にセットしました / set as factory-test reference', 'log-info');
  document.getElementById('goldPrg').scrollIntoView({ behavior: 'smooth', block: 'center' });
};

initViewer();
applyLang();
setStatus('offline');
if (!('serial' in navigator)) document.getElementById('noSerialWarn').style.display = 'block';
// Android は WebSerial の挙動が特殊なので接続ガイドを常時表示
if (/Android/i.test(navigator.userAgent) && ('serial' in navigator))
  document.getElementById('androidHint').style.display = 'block';
</script>
</body>
</html>
